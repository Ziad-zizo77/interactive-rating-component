<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Interactive rating component</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <!-- Rating Card -->
      <div class="card rating-card">
        <div class="img-container">
          <img src="./images/icon-star.svg" alt="star" class="star" />
        </div>

        <h1 class="title">How did we do?</h1>

        <p class="description">
          Please let us know how we did with your support request. All feedback
          is appreciated to help us improve our offering!
        </p>

        <ul class="nums">
          <li class="num"><a href="#">1</a></li>
          <li class="num"><a href="#">2</a></li>
          <li class="num"><a href="#">3</a></li>
          <li class="num active"><a href="#">4</a></li>
          <li class="num"><a href="#">5</a></li>
        </ul>

        <button class="btn" type="submit">Submit</button>
      </div>

      <!-- Thank You Card -->
      <div class="card thank-card hidden">
        <button class="back-btn">&larr; Back</button>

        <div class="img-container">
          <img src="./images/illustration-thank-you.svg" alt="thank you" />
        </div>

        <p class="text"></p>

        <h1 class="title">Thank you!</h1>

        <p class="description">
          We appreciate you taking the time to give a rating. If you ever need
          more support, don’t hesitate to get in touch!
        </p>
      </div>
    </main>
    <script src="main.js"></script>
  </body>
</html>
